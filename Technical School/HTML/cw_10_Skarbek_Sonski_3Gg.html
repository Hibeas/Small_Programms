<body>
	<script type="text/javascript">
	function oblicz (){
	var a = parseFloat(prompt("podaj a "));
	if (a % 2 == 0){
	document.write("Liczba "+a+" jest liczbą parzysta"+"<br>")
	}else{
	document.write("Liczba "+a+" nie jest liczbą parzysta"+"<br>")
	}}
	</script>
	<input type="number" id="oblicz" value="oblicz" onclick=oblicz()>
</body>
