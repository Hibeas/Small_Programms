<html>
<head>
	<meta charset="utf-8">
	<title>ćw-02 html,css,div</title>
	<style>
	#container{
		width:100%;
		height:100%;
		background-color:silver;
		}
	logo{
		width:100%;
		height:20%;
		background-color:grey;	
		}
	#nav{
	float:left;
		width:25%;
		height:60%;
		background-color:orange;
		}
	#content{
	float:left;
		width:50%;
		height:60%;
		background-color:yellow;
		}
	ad{
	float:left;
		width:25%;
		height:40%;
		background-color:red;
		}
	footer{
	clear:both
		width:100%;
		height:20%;
		background-color:green;
		}	
</style>
</head>
<body>
<!-- 
Napisz poprawnie dokument:
- zmień położenie domyślne bloków div na takie: "Efekt_końcowy.png", 
w tym celu użyć nalezy poleceń stylów CSS: 
"float:left" dla trzech bloków oraz "clear:both" dla ostatniego bloku, "container" należy umieścić centralnie na stronie, elementy blokowe mają wypełnić "container" w 100%
-->
	<div id="container"> 
		<div id="logo"> Logo </div>
		<div id="nav"> Nawigacja </div>
		<div id="content"> Zawartość </div>
		<div id="ad"> Reklama </div>
		<div id="footer"> Stopka </div>
	</div>
</body>
</html>
