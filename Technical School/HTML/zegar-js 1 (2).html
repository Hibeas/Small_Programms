<!DOCTYPE html>
    <head>
        <title>Odliczanie czasu-zegar</title>
        <meta charset="UTF-8">
        <script type="text/javascript">
		
		function odliczanie()
		{
            var dzisiaj = new Date();
			
			var dzien = dzisiaj.getDate();
			if (dzien<10)dzien = "0"+dzien;
			var miesiac = dzisiaj.getMonth()+1;	
			if (miesiac<10)miesiac = "0"+miesiac;
            var rok = dzisiaj.getFullYear();
			var dztyg = dzisiaj.getDay();
			if(dztyg==0){dztyg="niedziela"}else if(dztyg==1){dztyg="poniedzialek"}else if(dztyg==2){dztyg="wtorek"}else if(dztyg==3){dztyg="sroda"}else if(dztyg==4){dztyg="czwartek"}else if(dztyg==5){dztyg="piatek"}else if(dztyg==6){dztyg="sobota"}
			
			var godzina = dzisiaj.getHours();
			if (godzina<10)godzina = "0"+godzina;
			var minuta = dzisiaj.getMinutes();
			if (minuta<10)minuta = "0"+minuta;
			var sekunda = dzisiaj.getSeconds();
			if (sekunda<10)sekunda = "0"+sekunda;
			
			document.getElementById("zegar").innerHTML = 
		    dzien+"/"+miesiac+"/"+rok+", "+dztyg+" | "+godzina+":"+minuta+":"+sekunda;
			
			setTimeout("odliczanie()",1000);
		}			
        </script>		

</head>
    <body onload="odliczanie();"> 
        <div id="zegar"></div>        		
    </body>
</html>
